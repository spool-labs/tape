[package]
name = "rpc-litesvm"
version = "0.1.0"
edition = "2021"
license = "MIT"

[dependencies]
rpc = { path = "../rpc" }
async-trait = "0.1"
solana-client.workspace = true
solana-transaction-status.workspace = true
litesvm = { version = "0.13.0", default-features = false }
agave-feature-set = { version = "=4.0.0", features = ["agave-unstable-api"] }
bincode = "1.3"
solana-account.workspace = true
solana-clock.workspace = true
solana-commitment-config.workspace = true
solana-hash.workspace = true
solana-message.workspace = true
solana-pubkey.workspace = true
solana-signature.workspace = true
solana-transaction.workspace = true
solana-transaction-context.workspace = true
solana-transaction-error.workspace = true
tokio = { version = "1.37", features = ["rt", "time"] }
tape-crypto.workspace = true

[dev-dependencies]
tokio = { version = "1.37", features = ["macros", "rt-multi-thread"] }
rpc-client = { path = "../rpc-client" }
solana-keypair.workspace = true
solana-signer.workspace = true
solana-system-interface.workspace = true
tape-api.workspace = true
tape-blocks = { path = "../../lib/blocks" }
