[package]
name = "rpc-client"
description = "RPC client for Tapedrive on-chain program queries"
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
keywords.workspace = true

[dependencies]
# RPC trait and production implementation
rpc = { version = "0.3.0", path = "../rpc" }
rpc-solana = { version = "0.3.0", path = "../rpc-solana" }

# Tape crates
tape-api.workspace = true
tape-core.workspace = true
tape-crypto.workspace = true
tape-metrics = { workspace = true, optional = true }

# Solana dependencies
solana-client.workspace = true
solana-account-decoder.workspace = true
solana-commitment-config.workspace = true
solana-compute-budget-interface.workspace = true
solana-hash.workspace = true
solana-instruction.workspace = true
solana-keypair.workspace = true
solana-pubkey.workspace = true
solana-signature.workspace = true
solana-signer.workspace = true
solana-system-interface.workspace = true
solana-transaction.workspace = true
solana-transaction-status.workspace = true

# Async runtime
tokio.workspace = true

# Concurrency
arc-swap.workspace = true

# Error handling
thiserror.workspace = true
anyhow.workspace = true

# Serialization
bytemuck.workspace = true

# Logging
tracing = "0.1"

[features]
default = []
metrics = ["tape-metrics/metrics", "rpc-solana/metrics"]

[dev-dependencies]
rpc-litesvm = { path = "../rpc-litesvm" }
