[package]
name = "tapedrive-program"
description.workspace = true
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
keywords.workspace = true
readme.workspace = true

documentation = "https://docs.rs/tapedrive-program"

[lib]
crate-type = ["cdylib", "lib"]
name = "tapedrive"

[features]
default = []
solana = []
airdrop = []

[dependencies]
tape-core = { workspace = true, features = ["solana"] }
tape-crypto = { workspace = true, features = ["solana"] }
tape-api = { workspace = true, features = ["solana"] }

mpl-token-metadata.workspace = true
solana-program.workspace = true
spl-token.workspace = true
spl-associated-token-account.workspace = true
tape-solana.workspace = true
thiserror.workspace = true
bytemuck.workspace = true
num_enum.workspace = true

# Fix for issues with `build-sbf` rustc (updated for solana 2.3)
bytemuck_derive="1.9.3"
half = "=2.4.1"

[dev-dependencies]
tape-test.workspace = true

bincode = "1.3"
solana-sdk.workspace = true
mollusk-svm = "0.5.1"
mollusk-svm-programs-token = "0.5.1"
pretty-hex = "0.4.1"
rand = "0.8.5"
solana-compute-budget = "2.3"
solana-client.workspace = true
tokio = { version = "1.37", features = ["full"] }
