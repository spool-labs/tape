[package]
name = "tape-node-client"
description = "Client library for communicating with tapedrive storage nodes"
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
keywords.workspace = true

[features]
default = []
metrics = ["tape-metrics/metrics"]

[dependencies]
# Internal crates
tape-crypto = { workspace = true, features = ["wincode"] }
tape-metrics = { workspace = true, optional = true }

# HTTP client
reqwest = { workspace = true, features = ["rustls-tls"] }
tokio = { workspace = true }

# URL handling
url = "2.5"

# Serialization
wincode = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
thiserror = { workspace = true }

# Async
futures = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
