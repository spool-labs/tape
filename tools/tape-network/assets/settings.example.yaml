# Example settings.yaml for `tape-network`.
# Copy to `settings.yaml` in your working directory and fill in the gaps.
# Values of the form dollar-brace-NAME-brace are expanded from the environment
# at load time; an unset variable is a hard error.

testbed_id: "${USER}-tape-devnet"

cloud:
  provider: digitalocean
  token: "${DIGITALOCEAN_ACCESS_TOKEN}"
  ssh_key_file: "~/.ssh/id_ed25519.pub"
  ssh_private_key_file: "~/.ssh/id_ed25519"
  region: nyc3
  size: s-4vcpu-8gb
  image: ubuntu-24-04-x64
  # volume_gb: 100   # uncomment to attach a data volume per droplet

network:
  node_count: 20
  working_dir: /opt/tape
  data_dir: /mnt/tape-data
  open_ports: [8080, 9000]

solana:
  cluster: devnet
  rpc_url: https://api.devnet.solana.com
  ws_url:  wss://api.devnet.solana.com
  treasury_keypair: "~/.tape/treasury.json"
  program_ids:     # pin after first `genesis deploy-programs`
    tapedrive: null
    token:     null
    staking:   null
    exchange:  null

genesis:
  # Optional 32-byte hex seed (with or without 0x). Per-node seeds are derived
  # by XORing the node index into the last 4 bytes.
  # deterministic_seed: "0xCAFEBABE..."
  per_node_sol: 2
  per_node_tape: 1000
  stake_amount: 500
  commission_bp: 500

build:
  mode: release
  source:
    kind: local
    path: ../..
    # Alternatively:
    # kind: git
    # url: https://github.com/tapedrive-io/tape.git
    # commit: main

monitoring:
  enabled: false
  dedicated_droplet: false
  scrape_interval_secs: 15

ssh:
  user: root
  timeout_secs: 30
  retries: 3
