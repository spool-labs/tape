[package]
name = "tape-node"
version.workspace = true
edition.workspace = true
description = "Tapedrive storage node runtime"

[[bin]]
name = "tape-node"
path = "src/bin/node/main.rs"

[dependencies]
# Workspace crates
tape-api = { workspace = true, features = ["wincode"] }
tape-core = { workspace = true, features = ["wincode"] }
tape-crypto = { workspace = true, features = ["wincode"] }
tape-store = { workspace = true }
tape-blocks = { workspace = true }
tape-slicer = { workspace = true }
tape-spooler = { workspace = true }
store = { workspace = true, features = ["metrics"] }
store-rocks = { workspace = true }
tape-protocol = { workspace = true }
peer-http = { workspace = true }
rpc = { workspace = true }
rpc-client = { workspace = true }
rpc-solana = { workspace = true }
tape-retry = { workspace = true }

# External
arc-swap = "1"
tokio = { workspace = true }
tokio-util = { version = "0.7", features = ["rt"] }
tracing = "0.1"
solana-sdk = { workspace = true }
solana-transaction-status = { workspace = true }
async-trait = { workspace = true }
bytemuck = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true }
serde_yaml = "0.9"
dirs = { workspace = true }
shellexpand = "3"
prometheus = { workspace = true }
axum = { workspace = true }
tower = { version = "0.5", features = ["limit"] }
wincode = { workspace = true }
serde_json = { workspace = true }
rand = { workspace = true }
clap = { version = "4", features = ["derive"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
rpc-litesvm = { workspace = true }
peer-memory = { workspace = true }
