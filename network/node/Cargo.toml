[package]
name = "tape-node"
version.workspace = true
edition.workspace = true
description = "Tapedrive storage node runtime (v2)"

[[bin]]
name = "tape-node"
path = "src/bin/node/main.rs"

[dependencies]
# Workspace crates
tape-api = { workspace = true, features = ["wincode"] }
tape-core = { workspace = true, features = ["wincode"] }
tape-crypto = { workspace = true, features = ["wincode"] }
tape-sdk = { workspace = true }
tape-store = { workspace = true }
tape-blocks = { workspace = true }
tape-spooler = { workspace = true }
store = { workspace = true }
store-rocks = { workspace = true }
tape-protocol = { workspace = true }
peer-manager = { workspace = true }
peer-http = { workspace = true }
peer-tls = { workspace = true }
rpc = { workspace = true }
rpc-client = { workspace = true }
rpc-solana = { workspace = true }
tape-retry = { workspace = true }
tape-metrics = { workspace = true, optional = true }

# External
tokio = { workspace = true }
tokio-util = { version = "0.7", features = ["rt"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
thiserror = { workspace = true }
serde = { workspace = true }
serde_yaml = "0.9"
clap = { version = "4", features = ["derive"] }
dirs = { workspace = true }
axum = { workspace = true }
axum-server = { version = "0.7", default-features = false, features = ["tls-rustls-no-provider"] }
rustls = "0.23"
tokio-rustls = { version = "0.26", default-features = false, features = ["ring"] }
hyper = { workspace = true }
x509-parser = "0.16"
tower = { version = "0.5", features = ["limit", "load-shed", "timeout"] }
tower-http = { version = "0.6", features = ["trace"] }
bytemuck = { workspace = true }
tape-slicer = { workspace = true }
wincode = { workspace = true }
lz4_flex = { workspace = true }
rlimit = "0.10"
rand = { workspace = true }
rand_chacha = "0.3"
hex = { workspace = true }
serde_json = { workspace = true }
# Force vendored openssl so zigbuild doesn't need a system libssl for the
# x86_64-linux cross-compile. Indirect dep via solana-rpc-client → reqwest
# with native-tls; vendored=1 builds libssl from source via openssl-src.
openssl = { version = "0.10", features = ["vendored"] }

[dev-dependencies]
anyhow = { workspace = true }
tempfile = "3"
solana-sdk = { workspace = true }
rpc-litesvm = { workspace = true }
peer-memory = { workspace = true }
store-memory = { workspace = true }
tape-chain-harness = { workspace = true }

[features]
default = []
metrics = [
    "tape-metrics/metrics",
    "rpc-client/metrics",
    "store/metrics",
    "store-rocks/metrics",
]
