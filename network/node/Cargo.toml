[package]
name = "tape-node"
description = "Tapedrive storage node library"
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
keywords.workspace = true

[features]
default = []

[dependencies]
# Internal crates
tape-core = { workspace = true }
tape-api = { workspace = true }
tape-crypto = { workspace = true, features = ["wincode"] }
tape-metrics = { workspace = true, features = ["metrics", "http"] }
tape-node-api = { workspace = true }
tape-node-client = { workspace = true }
tape-sdk = { workspace = true }
tape-slicer = { workspace = true }
tape-store = { workspace = true }
rpc-client = { workspace = true }
rpc = { workspace = true }
rpc-solana = { workspace = true }
store = { workspace = true }
store-rocks = { workspace = true }

# Solana (rpc-client re-exports what we need for transactions)
solana-sdk = { workspace = true }
solana-transaction-status = { workspace = true }

# HTTP Server
axum = { workspace = true }
tokio = { workspace = true }
hyper = { workspace = true }

# Serialization
wincode = { workspace = true }
serde = { workspace = true }
serde_yaml = "0.9"

# Error handling
thiserror = { workspace = true }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# CLI
clap = { workspace = true }

# Solana
solana-program = { workspace = true }

# Async utilities
tokio-util = "0.7"
futures = { workspace = true }

# Other
anyhow = { workspace = true }
serde_json = { workspace = true }
bs58 = "0.5"
dirs = "5"
hex = { workspace = true }
shellexpand = "3"

[dev-dependencies]
tower = "0.5"
store-memory = { workspace = true }
