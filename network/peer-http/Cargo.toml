[package]
name = "peer-http"
version.workspace = true
edition.workspace = true
description = "HTTP implementation of the Peer trait for production node-to-node communication"

[dependencies]
tape-protocol = { workspace = true }
peer-manager = { workspace = true }
tape-api = { workspace = true }
tape-core = { workspace = true, features = ["wincode"] }
tape-crypto = { workspace = true, features = ["wincode"] }
tape-store = { workspace = true }
peer-tls = { workspace = true }
async-trait.workspace = true
reqwest = { workspace = true }
wincode = { workspace = true }
prometheus = { workspace = true }
dashmap = { workspace = true }

[dev-dependencies]
axum = { workspace = true }
axum-server = { version = "0.7", default-features = false, features = ["tls-rustls-no-provider"] }
tokio = { workspace = true }
rand = { workspace = true }
