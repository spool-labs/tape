[package]
name = "rpc-client"
description = "RPC client for Tapedrive on-chain program queries"
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
keywords.workspace = true

[dependencies]
# RPC trait and production implementation
rpc = { version = "0.3.0", path = "../rpc" }
rpc-solana = { version = "0.3.0", path = "../rpc-solana" }

# Tape crates
tape-api.workspace = true
tape-core.workspace = true
tape-metrics = { workspace = true, optional = true }

# Solana dependencies
solana-sdk.workspace = true
solana-client.workspace = true
solana-account-decoder.workspace = true
solana-transaction-status.workspace = true

# Async runtime
tokio.workspace = true

# Error handling
thiserror.workspace = true
anyhow.workspace = true

# Serialization
bytemuck.workspace = true

# Logging (optional)
tracing = { version = "0.1", optional = true }

[features]
default = []
metrics = ["tape-metrics/metrics", "rpc-solana/metrics"]

[dev-dependencies]
# Test RPC implementation using TestValidator
rpc-test = { version = "0.3.0", path = "../rpc-test" }
solana-test-validator.workspace = true
tokio = { workspace = true, features = ["test-util", "macros"] }

# SPL token dependencies for E2E tests
spl-token.workspace = true
spl-associated-token-account.workspace = true

# Serial test execution
serial_test = "3.1"
