[package]
name = "rpc-litesvm"
version = "0.1.0"
edition = "2021"
license = "MIT"

[dependencies]
rpc = { path = "../rpc" }
async-trait = "0.1"
solana-client = "=2.3"
solana-sdk = "=2.3"
solana-transaction-status = "=2.3"
litesvm = { version = "0.7", default-features = false }

[dev-dependencies]
tokio = { version = "1.37", features = ["macros", "rt-multi-thread"] }
rpc-client = { path = "../rpc-client" }
tape-blocks = { path = "../../network/blocks" }
